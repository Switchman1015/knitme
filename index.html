<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#b8b4ad" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="KnitMe は、ドット編み図を迷わず作って迷わず見るためのシンプルな PWA です。"
    />
    <title>KnitMe</title>
    <link rel="manifest" href="./manifest.webmanifest?v=5" />
    <link rel="icon" href="./icons/icon.svg?v=5" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=5" />
    <link rel="stylesheet" href="./styles.css?v=5" />
  </head>
  <body data-mode="draw" data-settings-open="false" data-dialog="none">
    <div class="app-shell">
      <section class="artboard-shell">
        <div id="artboardViewport" class="artboard-viewport">
          <div id="artboardCanvas" class="artboard-canvas">
            <div id="gridScroller" class="artboard-grid" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <aside class="mini-map panel" aria-label="アートボード全体図">
        <canvas id="miniMapCanvas" class="mini-map__canvas" width="184" height="144"></canvas>
      </aside>

      <nav class="menu-bar panel" aria-label="アートボードメニュー">
        <button
          id="settingsToggleButton"
          class="menu-button menu-button--subtle"
          type="button"
          aria-controls="settingsPanel"
          aria-expanded="false"
        >
          詳細設定
        </button>
        <button id="modeToggleButton" class="menu-button menu-button--primary" type="button">
          ビューモード
        </button>
        <button id="exportButton" class="menu-button" type="button">PNG出力</button>
        <button id="resetButton" class="menu-button menu-button--warn" type="button">
          アートボードリセット
        </button>
      </nav>

      <div id="settingsBackdrop" class="settings-backdrop" aria-hidden="true"></div>

      <aside
        id="settingsPanel"
        class="settings-panel panel"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-labelledby="settingsTitle"
      >
        <div class="settings-panel__header">
          <h1 id="settingsTitle" class="settings-title">詳細設定</h1>
          <button
            id="settingsCloseButton"
            class="close-button"
            type="button"
            aria-label="詳細設定を閉じる"
          >
            閉じる
          </button>
        </div>

        <div class="settings-panel__body">
          <section class="control-block control-block--first">
            <div class="block-header">
              <h2>サイズ</h2>
            </div>

            <div class="slider-grid">
              <label class="slider-field">
                <div class="slider-field__top">
                  <span>横のドット数</span>
                  <strong id="colsValue">24</strong>
                </div>
                <input id="colsInput" type="range" min="1" max="120" step="1" />
              </label>

              <label class="slider-field">
                <div class="slider-field__top">
                  <span>縦のドット数</span>
                  <strong id="rowsValue">24</strong>
                </div>
                <input id="rowsInput" type="range" min="1" max="120" step="1" />
              </label>

              <label class="slider-field">
                <div class="slider-field__top">
                  <span>ドット横幅</span>
                  <strong id="cellWidthValue">28</strong>
                </div>
                <input id="cellWidthInput" type="range" min="12" max="60" step="1" />
              </label>

              <label class="slider-field">
                <div class="slider-field__top">
                  <span>ドット縦幅</span>
                  <strong id="cellHeightValue">28</strong>
                </div>
                <input id="cellHeightInput" type="range" min="12" max="60" step="1" />
              </label>
            </div>
          </section>

          <section class="control-block">
            <div class="block-header">
              <h2>色</h2>
            </div>

            <div class="color-grid">
              <label class="color-field">
                <span>白ドット</span>
                <input id="lightColorInput" type="color" value="#fffdfa" />
              </label>

              <label class="color-field">
                <span>黒ドット</span>
                <input id="darkColorInput" type="color" value="#2d2925" />
              </label>
            </div>
          </section>
        </div>
      </aside>

      <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true"></div>

      <section
        id="exportModal"
        class="dialog-card panel"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-labelledby="exportDialogTitle"
      >
        <div class="dialog-card__header">
          <h2 id="exportDialogTitle">PNG出力</h2>
          <button class="close-button" type="button" data-close-dialog="true">閉じる</button>
        </div>
        <div class="dialog-card__body">
          <div class="preview-frame">
            <img id="exportPreviewImage" class="preview-image" alt="PNGプレビュー" />
          </div>
        </div>
        <div class="dialog-card__actions">
          <button id="downloadExportButton" class="menu-button menu-button--primary" type="button">
            保存
          </button>
        </div>
      </section>

      <section
        id="resetModal"
        class="dialog-card dialog-card--compact panel"
        role="dialog"
        aria-modal="true"
        aria-hidden="true"
        aria-labelledby="resetDialogTitle"
      >
        <div class="dialog-card__header">
          <h2 id="resetDialogTitle">アートボードリセット</h2>
          <button class="close-button" type="button" data-close-dialog="true">閉じる</button>
        </div>
        <div class="dialog-card__body">
          <p class="dialog-copy">アートボードをすべて白に戻しますか。</p>
        </div>
        <div class="dialog-card__actions">
          <button class="menu-button menu-button--subtle" type="button" data-close-dialog="true">
            キャンセル
          </button>
          <button id="confirmResetButton" class="menu-button menu-button--warn" type="button">
            リセット
          </button>
        </div>
      </section>
    </div>

    <script type="module" src="./app.js?v=5"></script>
  </body>
</html>
